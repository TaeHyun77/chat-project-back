spring.application.name=chat
spring.config.import=optional:file:.env[.properties]

app.base-url=${APP_BASE_URL:http://localhost:8080}

spring.jpa.hibernate.ddl-auto=update

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/chat_db?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=tiffndla0423

spring.jwt.secret=${JWT_SECRET}

data.api.key=${DATA_API_KEY}

redis.host = ${REDIS_HOST}
redis.port = ${REDIS_PORT}

redis.plane.hash.key=${REDIS_PLANE_HASH_KEY}

# Batch Setting
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

